<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0E17" />
    <title>VPNCraft</title>
    <style>
      body { margin: 0; background: #060910; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #060910;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      @keyframes splash-glow {
        0%, 100% { filter: drop-shadow(0 0 12px rgba(16,185,129,0.4)); }
        50% { filter: drop-shadow(0 0 24px rgba(16,185,129,0.7)); }
      }
      @keyframes splash-fade-in {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
      }
      #splash svg { animation: splash-glow 2s ease-in-out infinite, splash-fade-in 0.6s ease-out; }
      #splash .brand {
        margin-top: 16px; font-family: -apple-system, sans-serif;
        font-weight: 700; font-size: 22px; color: #F9FAFB;
        letter-spacing: -0.02em;
        animation: splash-fade-in 0.6s ease-out 0.2s both;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg width="72" height="72" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 4L6 10v10l10 8 10-8V10L16 4z" stroke="#10B981" stroke-width="1.5" fill="none"/>
        <path d="M16 8l-6 4.5v7L16 24l6-4.5v-7L16 8z" fill="#10B981" opacity="0.15"/>
        <path d="M13 16l3 3 5-5" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="brand">VPNCraft</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
