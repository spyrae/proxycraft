<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0E17" />
    <link rel="dns-prefetch" href="https://bot.proxycraft.tech" />
    <link rel="preconnect" href="https://bot.proxycraft.tech" crossorigin />
    <title>ProxyCraft</title>
    <style>
      body { margin: 0; background: #060910; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #060910;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      @keyframes splash-glow {
        0%, 100% { filter: drop-shadow(0 0 12px rgba(16,185,129,0.4)); }
        50% { filter: drop-shadow(0 0 24px rgba(16,185,129,0.7)); }
      }
      @keyframes splash-fade-in {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
      }
      #splash svg { animation: splash-glow 2s ease-in-out infinite, splash-fade-in 0.6s ease-out; }
      #splash .brand {
        margin-top: 16px; font-family: -apple-system, sans-serif;
        font-weight: 700; font-size: 22px; color: #F9FAFB;
        letter-spacing: -0.02em;
        animation: splash-fade-in 0.6s ease-out 0.2s both;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/favicon.svg?v=2" width="72" height="72" alt="ProxyCraft" />
      <div class="brand">ProxyCraft</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
