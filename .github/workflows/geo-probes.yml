name: Geo Probe Monitoring

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  geo-probes:
    name: Run Geo Probes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Run geo probes via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/proxycraft
            set -a
            . ./.env
            set +a

            if [ "${{ github.event_name }}" = "schedule" ]; then
              GEO_TRIGGER="scheduled"
            else
              GEO_TRIGGER="manual"
            fi

            sudo docker exec \
              -e SMOKE_FIXTURE_TG_ID_VPN_AMSTERDAM="${SMOKE_FIXTURE_TG_ID_VPN_AMSTERDAM:-}" \
              -e SMOKE_FIXTURE_TG_ID_VPN_SAINT_PETERSBURG="${SMOKE_FIXTURE_TG_ID_VPN_SAINT_PETERSBURG:-}" \
              -e SMOKE_FIXTURE_TG_ID_MTPROTO="${SMOKE_FIXTURE_TG_ID_MTPROTO:-}" \
              -e SMOKE_FIXTURE_TG_ID_WHATSAPP="${SMOKE_FIXTURE_TG_ID_WHATSAPP:-}" \
              -e SMOKE_MTPROTO_SUBSCRIPTION_ID="${SMOKE_MTPROTO_SUBSCRIPTION_ID:-}" \
              -e SMOKE_WHATSAPP_SUBSCRIPTION_ID="${SMOKE_WHATSAPP_SUBSCRIPTION_ID:-}" \
              -e SMOKE_VPN_SUBSCRIPTION_ID="${SMOKE_VPN_SUBSCRIPTION_ID:-}" \
              -e SMOKE_VPN_AMSTERDAM_SUBSCRIPTION_ID="${SMOKE_VPN_AMSTERDAM_SUBSCRIPTION_ID:-}" \
              -e SMOKE_VPN_SAINT_PETERSBURG_SUBSCRIPTION_ID="${SMOKE_VPN_SAINT_PETERSBURG_SUBSCRIPTION_ID:-}" \
              -e GEO_PROBE_PREFERRED_NODES_SEA="${GEO_PROBE_PREFERRED_NODES_SEA:-}" \
              -e GEO_PROBE_PREFERRED_NODES_EU="${GEO_PROBE_PREFERRED_NODES_EU:-}" \
              -e GEO_PROBE_PREFERRED_NODES_RU_FRIENDLY="${GEO_PROBE_PREFERRED_NODES_RU_FRIENDLY:-}" \
              -e GEO_PROBE_HTTP_TIMEOUT="${GEO_PROBE_HTTP_TIMEOUT:-}" \
              -e GEO_PROBE_POLL_ATTEMPTS="${GEO_PROBE_POLL_ATTEMPTS:-}" \
              -e GEO_PROBE_POLL_INTERVAL="${GEO_PROBE_POLL_INTERVAL:-}" \
              -e GEO_PROBE_FIXTURE_TIMEOUT="${GEO_PROBE_FIXTURE_TIMEOUT:-}" \
              -e GITHUB_SHA="${{ github.sha }}" \
              -e GITHUB_RUN_ID="${{ github.run_id }}" \
              -e GITHUB_REPOSITORY="${{ github.repository }}" \
              -e GITHUB_SERVER_URL="${{ github.server_url }}" \
              -e PYTHONPATH=/:/app \
              proxycraft-bot \
              poetry run python /app/scripts/run_geo_probes.py --json --notify --notify-warnings --trigger "$GEO_TRIGGER"
