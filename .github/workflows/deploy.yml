name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'mtproto/**'
      - 'whatsapp/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'poetry.lock'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Bot
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/proxycraft
            git pull origin main
            sudo docker compose build bot mtproto
            sudo docker compose up -d bot mtproto whatsapp
            echo "--- Bot logs (last 10 lines) ---"
            sleep 3
            sudo docker logs proxycraft-bot --tail 10 2>&1
            echo "--- MTProto logs (last 10 lines) ---"
            sudo docker logs proxycraft-mtproto --tail 10 2>&1
