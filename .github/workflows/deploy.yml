name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'scripts/**'
      - 'mtproto/**'
      - 'whatsapp/**'
      - '.github/workflows/deploy.yml'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'poetry.lock'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Bot
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/proxycraft
            git pull origin main
            sudo docker compose build bot mtproto whatsapp
            for service in bot mtproto whatsapp; do
              stale_ids="$(sudo docker ps -a --format '{{.ID}} {{.Names}}' | awk -v svc="$service" '$2 ~ ("_proxycraft-" svc "$") { print $1 }')"
              if [ -n "$stale_ids" ]; then
                echo "Removing stale temporary containers for $service"
                echo "$stale_ids" | xargs -r sudo docker rm -f
              fi
            done
            sudo docker compose up -d bot mtproto whatsapp
            wait_for_service() {
              local service="$1"
              local require_health="${2:-false}"
              local container="proxycraft-${service}"
              local attempts=30
              local sleep_seconds=2

              for _ in $(seq 1 "$attempts"); do
                local status
                status="$(sudo docker inspect --format '{{.State.Status}}' "$container" 2>/dev/null || true)"
                if [ "$status" != "running" ]; then
                  sleep "$sleep_seconds"
                  continue
                fi

                if [ "$require_health" = "true" ]; then
                  local health
                  health="$(sudo docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container" 2>/dev/null || true)"
                  if [ "$health" = "healthy" ]; then
                    return 0
                  fi
                else
                  return 0
                fi

                sleep "$sleep_seconds"
              done

              echo "Service ${service} did not become ready in time"
              sudo docker inspect "$container" || true
              return 1
            }
            wait_for_service bot false
            wait_for_service mtproto true
            wait_for_service whatsapp true
            echo "--- Bot logs (last 10 lines) ---"
            sleep 3
            sudo docker logs proxycraft-bot --tail 10 2>&1
            echo "--- MTProto logs (last 10 lines) ---"
            sudo docker logs proxycraft-mtproto --tail 10 2>&1
            echo "--- WhatsApp logs (last 10 lines) ---"
            sudo docker logs proxycraft-whatsapp --tail 10 2>&1
            echo "--- Production smoke checks ---"
            set -a
            . ./.env
            set +a
            run_smoke() {
              local product="$1"
              echo "Running smoke check for ${product}"
              sudo docker exec \
                -e SMOKE_MTPROTO_SUBSCRIPTION_ID="${SMOKE_MTPROTO_SUBSCRIPTION_ID:-}" \
                -e SMOKE_WHATSAPP_SUBSCRIPTION_ID="${SMOKE_WHATSAPP_SUBSCRIPTION_ID:-}" \
                -e SMOKE_VPN_SUBSCRIPTION_ID="${SMOKE_VPN_SUBSCRIPTION_ID:-}" \
                -e SMOKE_MTPROTO_PROBE_HOST="${SMOKE_MTPROTO_PROBE_HOST:-}" \
                -e SMOKE_WHATSAPP_PROBE_HOST="${SMOKE_WHATSAPP_PROBE_HOST:-}" \
                -e SMOKE_VPN_PROBE_URL="${SMOKE_VPN_PROBE_URL:-}" \
                -e SMOKE_TCP_TIMEOUT="${SMOKE_TCP_TIMEOUT:-}" \
                -e SMOKE_HTTP_TIMEOUT="${SMOKE_HTTP_TIMEOUT:-}" \
                -e SMOKE_RETRY_COUNT="${SMOKE_RETRY_COUNT:-}" \
                -e PYTHONPATH=/app \
                proxycraft-bot \
                poetry run python -m scripts.run_smoke_checks --json --product "${product}"
            }
            run_smoke mtproto
            run_smoke whatsapp
            run_smoke vpn
