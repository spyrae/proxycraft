name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'scripts/**'
      - 'mtproto/**'
      - 'whatsapp/**'
      - '.github/workflows/deploy.yml'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'poetry.lock'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Bot
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/proxycraft

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for service in bot mtproto whatsapp; do
              stale_ids="$(sudo docker ps -a --format '{{.ID}} {{.Names}}' | awk -v svc="$service" '$2 ~ ("_proxycraft-" svc "$") { print $1 }')"
              if [ -n "$stale_ids" ]; then
                echo "Removing stale temporary containers for $service"
                echo "$stale_ids" | xargs -r sudo docker rm -f
              fi
            done

            sudo docker compose stop bot mtproto whatsapp || true
            sudo docker compose rm -f bot mtproto whatsapp || true
            sudo docker compose up -d --build --remove-orphans --wait --wait-timeout 180 bot mtproto whatsapp
            sudo docker compose ps
            echo "--- Bot logs (last 10 lines) ---"
            sleep 3
            sudo docker logs proxycraft-bot --tail 10 2>&1
            echo "--- MTProto logs (last 10 lines) ---"
            sudo docker logs proxycraft-mtproto --tail 10 2>&1
            echo "--- WhatsApp logs (last 10 lines) ---"
            sudo docker logs proxycraft-whatsapp --tail 10 2>&1
            echo "--- Post-deploy verification ---"
            set -a
            . ./.env
            set +a
            sudo docker exec \
              -e SMOKE_FIXTURE_TG_ID_VPN_AMSTERDAM="${SMOKE_FIXTURE_TG_ID_VPN_AMSTERDAM:-}" \
              -e SMOKE_FIXTURE_TG_ID_VPN_SAINT_PETERSBURG="${SMOKE_FIXTURE_TG_ID_VPN_SAINT_PETERSBURG:-}" \
              -e SMOKE_FIXTURE_TG_ID_MTPROTO="${SMOKE_FIXTURE_TG_ID_MTPROTO:-}" \
              -e SMOKE_FIXTURE_TG_ID_WHATSAPP="${SMOKE_FIXTURE_TG_ID_WHATSAPP:-}" \
              -e SMOKE_MTPROTO_SUBSCRIPTION_ID="${SMOKE_MTPROTO_SUBSCRIPTION_ID:-}" \
              -e SMOKE_WHATSAPP_SUBSCRIPTION_ID="${SMOKE_WHATSAPP_SUBSCRIPTION_ID:-}" \
              -e SMOKE_VPN_SUBSCRIPTION_ID="${SMOKE_VPN_SUBSCRIPTION_ID:-}" \
              -e SMOKE_VPN_AMSTERDAM_SUBSCRIPTION_ID="${SMOKE_VPN_AMSTERDAM_SUBSCRIPTION_ID:-}" \
              -e SMOKE_VPN_SAINT_PETERSBURG_SUBSCRIPTION_ID="${SMOKE_VPN_SAINT_PETERSBURG_SUBSCRIPTION_ID:-}" \
              -e SMOKE_MTPROTO_PROBE_HOST="${SMOKE_MTPROTO_PROBE_HOST:-}" \
              -e SMOKE_WHATSAPP_PROBE_HOST="${SMOKE_WHATSAPP_PROBE_HOST:-}" \
              -e SMOKE_VPN_PROBE_URL="${SMOKE_VPN_PROBE_URL:-}" \
              -e SMOKE_VPN_AMSTERDAM_PROBE_URL="${SMOKE_VPN_AMSTERDAM_PROBE_URL:-}" \
              -e SMOKE_VPN_SAINT_PETERSBURG_PROBE_URL="${SMOKE_VPN_SAINT_PETERSBURG_PROBE_URL:-}" \
              -e SMOKE_TCP_TIMEOUT="${SMOKE_TCP_TIMEOUT:-}" \
              -e SMOKE_HTTP_TIMEOUT="${SMOKE_HTTP_TIMEOUT:-}" \
              -e SMOKE_RETRY_COUNT="${SMOKE_RETRY_COUNT:-}" \
              -e DEPLOY_GITHUB_SHA="${{ github.sha }}" \
              -e DEPLOY_GITHUB_RUN_ID="${{ github.run_id }}" \
              -e DEPLOY_GITHUB_REPOSITORY="${{ github.repository }}" \
              -e PYTHONPATH=/:/app \
              proxycraft-bot \
              poetry run python /app/scripts/run_post_deploy_verification.py --json --notify --notify-warnings
