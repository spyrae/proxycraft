global
    log stdout format raw local0
    tune.bufsize 4096
    maxconn 4096
    ssl-server-verify none

resolvers docker_dns
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 30s

defaults
    mode tcp
    timeout connect 5s
    timeout client-fin 1s
    timeout server-fin 1s
    timeout client 200s
    timeout server 200s
    default-server inter 10s fastinter 1s downinter 3s error-limit 50

# Chat backend: WhatsApp XMPP with PROXY protocol
backend wa
    default-server check inter 60000 observe layer4 send-proxy
    server wa1 g.whatsapp.net:5222 resolvers docker_dns resolve-prefer ipv4

# Media backend: whatsapp.net (no PROXY protocol)
backend wa_media
    default-server check inter 60000 observe layer4
    server media1 whatsapp.net:443 resolvers docker_dns resolve-prefer ipv4

# Shared media frontends (ports 587, 7777 — media upload/download)
frontend media_587
    bind *:587
    default_backend wa_media

frontend media_7777
    bind *:7777
    default_backend wa_media
