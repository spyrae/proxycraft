<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0A0E17;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Grid overlay */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(16, 185, 129, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(16, 185, 129, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Glow effects */
  .glow-center {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.18) 0%, transparent 65%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(40px);
  }

  .glow-top-right {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, transparent 70%);
    top: -100px;
    right: -80px;
    filter: blur(60px);
  }

  .glow-bottom-left {
    position: absolute;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
    bottom: -80px;
    left: -60px;
    filter: blur(50px);
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
  }

  /* Logo */
  .logo-wrap {
    width: 96px;
    height: 96px;
    margin-bottom: 28px;
    filter: drop-shadow(0 0 32px rgba(16, 185, 129, 0.6));
  }

  /* Title */
  .title {
    font-size: 80px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -3px;
    line-height: 1;
    margin-bottom: 20px;
  }

  .title span {
    background: linear-gradient(135deg, #10B981 0%, #34D399 50%, #06B6D4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Divider */
  .divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #10B981, transparent);
    border-radius: 2px;
    margin-bottom: 20px;
  }

  /* Tagline */
  .tagline {
    font-size: 24px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 0.01em;
    margin-bottom: 36px;
  }

  /* Chips */
  .chips {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .chip {
    background: rgba(16, 185, 129, 0.12);
    border: 1px solid rgba(16, 185, 129, 0.3);
    color: #34D399;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 100px;
    letter-spacing: 0.02em;
  }

  .chip-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }

  /* Domain */
  .domain {
    position: absolute;
    bottom: 36px;
    right: 48px;
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.05em;
  }

  /* Corner accent lines */
  .corner-tl {
    position: absolute;
    top: 32px;
    left: 32px;
    width: 40px;
    height: 40px;
    border-top: 2px solid rgba(16, 185, 129, 0.4);
    border-left: 2px solid rgba(16, 185, 129, 0.4);
    border-radius: 4px 0 0 0;
  }

  .corner-br {
    position: absolute;
    bottom: 32px;
    right: 32px;
    width: 40px;
    height: 40px;
    border-bottom: 2px solid rgba(16, 185, 129, 0.4);
    border-right: 2px solid rgba(16, 185, 129, 0.4);
    border-radius: 0 0 4px 0;
  }
</style>
</head>
