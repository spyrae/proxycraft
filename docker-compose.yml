services:
  redis:
    image: redis:7-alpine
    container_name: proxycraft-redis
    restart: always
    volumes:
      - redis_data:/data

  mtproto:
    build:
      context: ./mtproto
      dockerfile: Dockerfile
    image: proxycraft-mtproto:latest
    container_name: proxycraft-mtproto
    restart: unless-stopped
    ports:
      - "8444:8444"
    volumes:
      - ./mtproto/config.py:/app/config.py:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8444), 2); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  whatsapp:
    build:
      context: ./whatsapp
      dockerfile: Dockerfile
    image: proxycraft-whatsapp:latest
    container_name: proxycraft-whatsapp
    restart: unless-stopped
    ports:
      - "587:587"
      - "7777:7777"
      - "10001-10999:10001-10999"
    env_file:
      - .env
    volumes:
      - ./whatsapp/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - whatsapp_ssl:/etc/haproxy/ssl
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  bot:
    build: .
    container_name: proxycraft-bot
    volumes:
      - ./app/data:/app/data
      - ./app/locales:/app/locales
      - ./app/logs:/app/logs
      - ./mtproto:/app/mtproto
      - ./whatsapp/haproxy.cfg:/app/whatsapp/haproxy.cfg
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    stop_signal: SIGINT
    restart: unless-stopped
    command: sh -c "
      poetry run pybabel compile -d /app/locales -D bot &&
      poetry run alembic -c /app/db/alembic.ini upgrade head &&
      poetry run python /app/__main__.py"
    depends_on:
      - redis

volumes:
  redis_data:
  whatsapp_ssl:
