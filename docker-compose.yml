services:
  redis:
    image: redis:7-alpine
    container_name: vpncraft-redis
    restart: always
    volumes:
      - redis_data:/data

  mtproto:
    image: python:3.12-slim
    container_name: vpncraft-mtproto
    restart: unless-stopped
    ports:
      - "8444:8444"
    volumes:
      - ./mtproto/config.py:/app/config.py
      - ./mtproto/mtprotoproxy.py:/app/mtprotoproxy.py
    working_dir: /app
    command: python mtprotoproxy.py
    environment:
      - PYTHONUNBUFFERED=1

  bot:
    build: .
    container_name: vpncraft-bot
    volumes:
      - ./app/data:/app/data
      - ./plans.json:/app/data/plans.json
      - ./app/locales:/app/locales
      - ./app/logs:/app/logs
      - ./mtproto/config.py:/app/mtproto/config.py
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    stop_signal: SIGINT
    restart: unless-stopped
    command: sh -c "
      poetry run pybabel compile -d /app/locales -D bot &&
      poetry run alembic -c /app/db/alembic.ini upgrade head &&
      poetry run python /app/__main__.py"
    depends_on:
      - redis

volumes:
  redis_data:
