services:
  redis:
    image: redis:7-alpine
    container_name: proxycraft-redis
    restart: always
    volumes:
      - redis_data:/data

  mtproto:
    build:
      context: ./mtproto
      dockerfile: Dockerfile
    image: proxycraft-mtproto:latest
    container_name: proxycraft-mtproto
    restart: unless-stopped
    ports:
      - "8444:8444"
    volumes:
      - ./mtproto/config.py:/app/config.py

  whatsapp:
    image: haproxy:2.9-alpine
    container_name: proxycraft-whatsapp
    restart: unless-stopped
    ports:
      - "587:587"
      - "7777:7777"
      - "10001-10999:10001-10999"
    volumes:
      - ./whatsapp/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
      - ./whatsapp/ssl:/etc/haproxy/ssl:ro
    command: haproxy -f /usr/local/etc/haproxy/haproxy.cfg

  bot:
    build: .
    container_name: proxycraft-bot
    volumes:
      - ./app/data:/app/data
      - ./app/locales:/app/locales
      - ./app/logs:/app/logs
      - ./mtproto/config.py:/app/mtproto/config.py
      - ./whatsapp/haproxy.cfg:/app/whatsapp/haproxy.cfg
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    stop_signal: SIGINT
    restart: unless-stopped
    command: sh -c "
      poetry run pybabel compile -d /app/locales -D bot &&
      poetry run alembic -c /app/db/alembic.ini upgrade head &&
      poetry run python /app/__main__.py"
    depends_on:
      - redis

volumes:
  redis_data:
