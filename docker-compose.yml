services:
  redis:
    image: redis:7-alpine
    container_name: proxycraft-redis
    restart: always
    volumes:
      - redis_data:/data

  mtproto:
    build:
      context: ./mtproto
      dockerfile: Dockerfile
    image: proxycraft-mtproto:latest
    container_name: proxycraft-mtproto
    restart: unless-stopped
    ports:
      - "${SHOP_MTPROTO_PORT:-8444}:${SHOP_MTPROTO_PORT:-8444}"
    volumes:
      - mtproto_config:/app/runtime
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, socket; port=int(os.environ.get('MTPROTO_PORT', '8444')); s=socket.create_connection(('127.0.0.1', port), 2); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      MTPROTO_PORT: "${SHOP_MTPROTO_PORT:-8444}"
      MTPROTO_TLS_DOMAIN: "${SHOP_MTPROTO_TLS_DOMAIN:-www.cloudflare.com}"
      MTPROTO_MASK_HOST: "${SHOP_MTPROTO_MASK_HOST:-www.cloudflare.com}"
      MTPROTO_MASK_PORT: "${SHOP_MTPROTO_MASK_PORT:-443}"
      MTPROTO_FAST_MODE: "${SHOP_MTPROTO_FAST_MODE:-true}"

  whatsapp:
    build:
      context: ./whatsapp
      dockerfile: Dockerfile
    image: proxycraft-whatsapp:latest
    container_name: proxycraft-whatsapp
    restart: unless-stopped
    ports:
      - "127.0.0.1:4444:443"
      - "587:587"
      - "7777:7777"
      - "10001-10999:10001-10999"
    env_file:
      - .env
    volumes:
      - whatsapp_config:/usr/local/etc/haproxy
      - whatsapp_ssl:/etc/haproxy/ssl
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  bot:
    build: .
    container_name: proxycraft-bot
    volumes:
      - ./app/data:/app/data
      - ./app/locales:/app/locales
      - ./app/logs:/app/logs
      - mtproto_config:/app/mtproto-runtime
      - whatsapp_config:/app/whatsapp-runtime
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    stop_signal: SIGINT
    restart: unless-stopped
    command: sh -c "
      poetry run pybabel compile -d /app/locales -D bot &&
      poetry run alembic -c /app/db/alembic.ini upgrade head &&
      poetry run python /app/__main__.py"
    depends_on:
      - redis

volumes:
  redis_data:
  mtproto_config:
  whatsapp_config:
  whatsapp_ssl:
